name: Bug Report
description: Report something that is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Verilume more reliable.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the shortest path that triggers the issue.
      placeholder: |
        1. Launch Verilume
        2. Upload ...
        3. Ask ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.0.0, main, or commit hash
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Remove tokens, API keys, private documents, and personal data before sharing.
      render: shell
