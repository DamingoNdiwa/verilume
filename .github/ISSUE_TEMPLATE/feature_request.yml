name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Share the workflow you want Verilume to support.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation does this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Describe the feature you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any other approaches or tools you tried?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Ingestion
        - Retrieval
        - Citations
        - Web search
        - Models
        - Export
        - Packaging
        - Documentation
        - Other
